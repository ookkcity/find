<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OKCITY 找歌</title>
  <meta name="theme-color" content="#120a2d" />
  <style>
    :root{
      --bg0:#070412;
      --bg1:#110826;
      --bg2:#1a0f3b;
      --text:#f5f0ff;
      --muted:#bfb2e6;
      --card-bg:rgba(22,13,47,.58);
      --card-bd:rgba(179,143,255,.28);
      --line:rgba(196,165,255,.35);
      --accent:#b084ff;
      --accent2:#7a5cff;
      --danger:#ffb7c2;
      --shadow:0 20px 55px rgba(6,3,14,.6);
      --glow:0 0 0 1px rgba(222,201,255,.20), 0 14px 36px rgba(120,72,255,.24);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    body{
      margin:0;
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      background:
        radial-gradient(1200px 720px at -8% -10%, #5e2cff40 0%, transparent 55%),
        radial-gradient(1000px 680px at 108% 5%, #9333ea33 0%, transparent 52%),
        linear-gradient(160deg,var(--bg0),var(--bg1) 44%,var(--bg2));
      overflow-x:hidden;
      position:relative;
      isolation:isolate;
    }

    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(34px);
      opacity:.35;
      pointer-events:none;
      z-index:0;
      animation: drift 28s ease-in-out infinite alternate;
    }
    .orb.o1{
      width:300px;height:300px; left:-80px; top:-60px;
      background:#7c3aed66;
    }
    .orb.o2{
      width:260px;height:260px; right:-70px; top:22%;
      background:#a855f766;
      animation-delay:2.4s;
    }
    .orb.o3{
      width:220px;height:220px; left:15%; bottom:-90px;
      background:#22d3ee33;
      animation-delay:4.2s;
    }

    @keyframes drift{
      0%{transform:translateY(-8px) translateX(0) scale(1)}
      100%{transform:translateY(14px) translateX(12px) scale(1.08)}
    }

    body::before{
      content:"";
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-image: radial-gradient(rgba(255,255,255,.08) 1px, transparent 1px);
      background-size:3px 3px;
      opacity:.07;
      mix-blend-mode:screen;
    }

    .bg-logo{
      position:fixed; inset:0; z-index:0; pointer-events:none;
      background-repeat:no-repeat;
      background-position:center;
      background-size:min(72vw,560px);
      background-image:url("https://drive.google.com/thumbnail?id=1jOcZh0B3m8KyNYejdOfK2E7QQM28b-We&sz=w1200");
      opacity:.09;
      filter:grayscale(100%) brightness(1.65) contrast(.9);
    }

    .wrap{
      position:relative;
      z-index:1;
      min-height:100%;
      display:grid;
      place-items:center;
      padding:24px 14px 30px;
    }

    .card{
      width:min(760px,100%);
      background:var(--card-bg);
      border:1px solid var(--card-bd);
      border-radius:26px;
      box-shadow:var(--shadow);
      backdrop-filter: blur(14px) saturate(130%);
      -webkit-backdrop-filter: blur(14px) saturate(130%);
      padding:22px 16px 18px;
      position:relative;
      overflow:hidden;
      animation: cardIn .9s ease-out both;
    }

    .card::after{
      content:"";
      position:absolute; inset:auto -30% -65% -30%;
      height:240px;
      background:radial-gradient(closest-side, #a855f73d, transparent 75%);
      pointer-events:none;
    }

    @keyframes cardIn{
      from{opacity:0; transform:translateY(10px) scale(.985)}
      to{opacity:1; transform:translateY(0) scale(1)}
    }

    .title{
      margin:2px 0 0;
      font-size:34px;
      line-height:1.2;
      text-align:center;
      letter-spacing:.3px;
      word-break:break-word;
      font-weight:900;
      background:linear-gradient(90deg,#f8f4ff,#d7c4ff 45%,#b999ff);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 10px 28px rgba(155,108,255,.22);
    }

    .subtitle{
      margin:10px 0 18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      letter-spacing:.25px;
    }

    .btn-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .link-btn{
      position:relative;
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      min-height:60px;
      padding:13px 14px;
      border-radius:14px;
      text-decoration:none;
      color:var(--text);
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.02));
      box-shadow:var(--glow);
      transition:transform .38s ease, border-color .38s ease, box-shadow .38s ease, background .38s ease;
      overflow:hidden;
      isolation:isolate;
    }

    .link-btn::before{
      content:"";
      position:absolute;
      top:0; bottom:0; left:-35%;
      width:30%;
      transform:skewX(-20deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transition:left 1.2s ease;
      z-index:0;
      pointer-events:none;
    }

    .link-btn:hover::before{ left:120%; }

    .link-btn:hover{
      transform:translateY(-2px);
      border-color:rgba(226,203,255,.68);
      background:linear-gradient(180deg, rgba(177,127,255,.18), rgba(255,255,255,.03));
      box-shadow:0 0 0 1px rgba(236,220,255,.24), 0 18px 36px rgba(110,62,235,.34);
    }

    .link-btn:active{ transform:translateY(0) scale(.995); }

    .logo{
      width:28px; height:28px;
      border-radius:9px;
      object-fit:cover;
      flex:0 0 28px;
      border:1px solid rgba(255,255,255,.2);
      background:#fff;
      z-index:1;
    }

    .label{
      z-index:1;
      font-weight:800;
      font-size:18px;
      letter-spacing:.2px;
    }

    .footer{
      margin-top:18px;
      display:flex;
      justify-content:center;
    }

    .ig-round{
      width:54px;height:54px;border-radius:999px;
      border:1px solid rgba(238,224,255,.5);
      background:radial-gradient(circle at 30% 30%, #fff 0%, #f4eefe 56%, #e8ddff 100%);
      display:flex;align-items:center;justify-content:center;text-decoration:none;
      box-shadow:0 0 0 4px rgba(203,170,255,.14), 0 12px 26px rgba(130,74,255,.4);
      transition:transform .38s ease, box-shadow .38s ease, filter .38s ease;
    }
    .ig-round:hover{
      transform:translateY(-2px) scale(1.045);
      box-shadow:0 0 0 6px rgba(221,193,255,.2), 0 18px 30px rgba(145,84,255,.45);
      filter:saturate(1.1);
    }
    .ig-round img{width:24px;height:24px;object-fit:contain}

    .warn{
      margin-top:10px;
      color:var(--danger);
      font-size:12px;
      text-align:center;
      min-height:16px;
    }

    .badge{
      width:max-content;
      margin:0 auto 12px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      letter-spacing:.3px;
      color:#eaddff;
      border:1px solid rgba(223,199,255,.34);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.02));
    }

    @media (max-width:560px){
      .title{font-size:28px}
      .label{font-size:17px}
      .card{padding:18px 14px 16px}
    }

    @media (prefers-reduced-motion: reduce){
      .orb,.card,.link-btn,.ig-round{animation:none;transition:none}
      .link-btn::before{display:none}
    }
  </style>
</head>
<body>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
  <div class="bg-logo"></div>

  <main class="wrap">
    <section class="card">
      <div class="badge">@OK._.CITY</div>
      <h1 class="title" id="songTitle">載入中...</h1>
      <div class="subtitle">點！！前往收聽！！！</div>

      <div class="btn-list">
        <a id="yt" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1D6swEIF7VvE6uqzANBF0NIYYZLznF2ns&sz=w200" alt="YouTube Music Logo">
          <span class="label">YouTube Music</span>
        </a>
        <a id="sp" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1q1_M90NNz86pGmBufeoiyKxK6QtmaPsz&sz=w200" alt="Spotify Logo">
          <span class="label">Spotify</span>
        </a>
        <a id="am" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1mUg-hU3YSat1cH6GqnhKLiazXW9d-CWP&sz=w200" alt="Apple Music Logo">
          <span class="label">Apple Music</span>
        </a>
        <a id="kk" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1KcoYfJ8n2vRU-6EARzbOobiACZmWgwd6&sz=w200" alt="KKBOX Logo">
          <span class="label">KKBOX</span>
        </a>
      </div>

      <div class="footer">
        <a class="ig-round" href="https://www.instagram.com/ok._.city" target="_blank" rel="noopener" aria-label="OKCITY IG">
          <img src="https://drive.google.com/thumbnail?id=1IvLLnDWdAT7YBzlua1Tz6TUgPDHW9zGO&sz=w200" alt="Instagram">
        </a>
      </div>

      <div class="warn" id="warn"></div>
    </section>
  </main>

  <script>
    const p = new URLSearchParams(location.search);
    const artist = (p.get('artist') || '').trim();
    const song = (p.get('song') || '').trim();

    const titleEl = document.getElementById('songTitle');
    const warnEl = document.getElementById('warn');

    const hasData = artist || song;
    titleEl.textContent = hasData
      ? `${artist || '未知作者'} - ${song || '未知歌名'}`
      : '未提供作者與歌名';

    const q = [artist, song].filter(Boolean).join(' ').trim();
    const enc = encodeURIComponent(q);

    const links = {
      yt: `https://music.youtube.com/search?q=${enc}`,
      sp: `https://open.spotify.com/search/${enc}`,
      am: `https://music.apple.com/tw/search?term=${enc}`,
      kk: `https://www.kkbox.com/tw/tc/search.php?word=${enc}`
    };

    ['yt','sp','am','kk'].forEach(id => {
      const a = document.getElementById(id);
      if (!q) {
        a.removeAttribute('href');
        a.style.opacity = '.5';
        a.style.pointerEvents = 'none';
      } else {
        a.href = links[id];
      }
    });

    if (!q) {
      warnEl.textContent = '提示：請從 LINE 使用「找歌 藝人 歌名」進入此頁。';
    }
  </script>
</body>
</html>
