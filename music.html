<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>OKCITY 找歌</title>
  <style>
    :root{
      --bg0:#0b0616;
      --bg1:#140a2b;
      --bg2:#1b0f3b;
      --card:rgba(22,14,44,.62);
      --card-border:rgba(168,132,255,.28);
      --text:#f3eeff;
      --muted:#b8addd;
      --line:rgba(173,139,255,.35);
      --btn:rgba(255,255,255,.04);
      --btn-hover:rgba(186,145,255,.12);
      --shadow:0 18px 48px rgba(8,4,18,.55);
      --glow:0 0 0 1px rgba(203,176,255,.18), 0 8px 26px rgba(129,78,255,.24);
      --radius:20px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,"Noto Sans TC",sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 700px at 10% -10%, #2c155f55 0%, transparent 55%),
        radial-gradient(1000px 640px at 95% 8%, #5a2ec744 0%, transparent 52%),
        linear-gradient(160deg,var(--bg0),var(--bg1) 45%,var(--bg2));
      min-height:100vh;
      overflow-x:hidden;
    }

    /* 柔光噪點 */
    body::before{
      content:"";
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:
        radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px);
      background-size:3px 3px;
      opacity:.08;
      mix-blend-mode:screen;
    }

    /* 淡色 OK LOGO 背景浮水印 */
    .bg-logo{
      position:fixed; inset:0; pointer-events:none; z-index:0;
      background-repeat:no-repeat;
      background-position:center;
      background-size:min(76vw,560px);
      background-image:url("https://drive.google.com/thumbnail?id=1jOcZh0B3m8KyNYejdOfK2E7QQM28b-We&sz=w1200");
      opacity:.08;
      filter:grayscale(100%) brightness(1.6) contrast(.9);
    }

    .wrap{
      position:relative; z-index:1;
      max-width:760px;
      margin:0 auto;
      padding:24px 14px 30px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:20px 16px 18px;
      backdrop-filter: blur(14px) saturate(125%);
      -webkit-backdrop-filter: blur(14px) saturate(125%);
    }

    .title{
      margin:0;
      font-size:34px;
      line-height:1.2;
      text-align:center;
      letter-spacing:.3px;
      word-break:break-word;
      font-weight:800;
      text-shadow:0 4px 22px rgba(154,99,255,.35);
    }

    .subtitle{
      margin:10px 0 18px;
      color:var(--muted);
      font-size:13px;
      text-align:center;
      letter-spacing:.2px;
    }

    .btn-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .link-btn{
      position:relative;
      display:flex;
      align-items:center;
      gap:12px;
      width:100%;
      text-decoration:none;
      color:var(--text);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid var(--line);
      border-radius:14px;
      padding:13px 14px;
      min-height:58px;
      box-shadow:var(--glow);
      transition:all .18s ease;
    }

    .link-btn:hover{
      transform:translateY(-1px);
      background:linear-gradient(180deg,var(--btn-hover),rgba(255,255,255,.03));
      border-color:rgba(208,177,255,.6);
      box-shadow:0 0 0 1px rgba(224,202,255,.26), 0 14px 30px rgba(112,63,236,.30);
    }

    .link-btn:active{ transform:translateY(0) scale(.995); }

    .logo{
      width:26px;
      height:26px;
      border-radius:8px;
      object-fit:cover;
      flex:0 0 26px;
      border:1px solid rgba(255,255,255,.2);
      background:#fff;
    }

    .label{
      font-weight:700;
      font-size:18px;
      letter-spacing:.2px;
    }

    .footer{
      margin-top:18px;
      display:flex;
      justify-content:center;
    }

    .ig-round{
      width:52px;
      height:52px;
      border-radius:999px;
      border:1px solid rgba(233,216,255,.45);
      background:radial-gradient(circle at 30% 30%, #ffffff 0%, #f4eefe 55%, #ece0ff 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      box-shadow:
        0 0 0 4px rgba(203,170,255,.12),
        0 10px 24px rgba(130,74,255,.35);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .ig-round:hover{
      transform:translateY(-1px) scale(1.03);
      box-shadow:
        0 0 0 5px rgba(221,193,255,.2),
        0 16px 28px rgba(145,84,255,.42);
    }

    .ig-round img{
      width:24px;
      height:24px;
      object-fit:contain;
    }

    .warn{
      margin-top:10px;
      color:#ffb7c2;
      font-size:12px;
      text-align:center;
    }

    @media (max-width:560px){
      .title{font-size:28px}
      .label{font-size:17px}
      .card{padding:18px 14px 16px}
    }
  </style>
</head>
<body>
  <div class="bg-logo"></div>

  <main class="wrap">
    <section class="card">
      <h1 class="title" id="songTitle">載入中...</h1>
      <div class="subtitle">選擇平台開啟搜尋結果</div>

      <div class="btn-list">
        <a id="yt" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1D6swEIF7VvE6uqzANBF0NIYYZLznF2ns&sz=w200" alt="YouTube Music Logo">
          <span class="label">YouTube Music</span>
        </a>
        <a id="sp" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1q1_M90NNz86pGmBufeoiyKxK6QtmaPsz&sz=w200" alt="Spotify Logo">
          <span class="label">Spotify</span>
        </a>
        <a id="am" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1mUg-hU3YSat1cH6GqnhKLiazXW9d-CWP&sz=w200" alt="Apple Music Logo">
          <span class="label">Apple Music</span>
        </a>
        <a id="kk" class="link-btn" target="_blank" rel="noopener">
          <img class="logo" src="https://drive.google.com/thumbnail?id=1KcoYfJ8n2vRU-6EARzbOobiACZmWgwd6&sz=w200" alt="KKBOX Logo">
          <span class="label">KKBOX</span>
        </a>
      </div>

      <div class="footer">
        <a class="ig-round" href="https://www.instagram.com/ok._.city" target="_blank" rel="noopener" aria-label="OKCITY IG">
          <img src="https://drive.google.com/thumbnail?id=1IvLLnDWdAT7YBzlua1Tz6TUgPDHW9zGO&sz=w200" alt="Instagram">
        </a>
      </div>

      <div class="warn" id="warn"></div>
    </section>
  </main>

  <script>
    const p = new URLSearchParams(location.search);
    const artist = (p.get('artist') || '').trim();
    const song = (p.get('song') || '').trim();

    const titleEl = document.getElementById('songTitle');
    const warnEl = document.getElementById('warn');

    const hasData = artist || song;
    titleEl.textContent = hasData ? `${artist || '未知作者'} - ${song || '未知歌名'}` : '未提供作者與歌名';

    const q = [artist, song].filter(Boolean).join(' ').trim();
    const enc = encodeURIComponent(q);

    const links = {
      yt: `https://music.youtube.com/search?q=${enc}`,
      sp: `https://open.spotify.com/search/${enc}`,
      am: `https://music.apple.com/tw/search?term=${enc}`,
      kk: `https://www.kkbox.com/tw/tc/search.php?word=${enc}`
    };

    ['yt','sp','am','kk'].forEach(id => {
      const a = document.getElementById(id);
      if (!q) {
        a.removeAttribute('href');
        a.style.opacity = '.55';
        a.style.pointerEvents = 'none';
      } else {
        a.href = links[id];
      }
    });

    if (!q) warnEl.textContent = '提示：請從 LINE 使用「找歌 藝人 歌名」進入此頁。';
  </script>
</body>
</html>
